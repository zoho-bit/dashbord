<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>AMUL Recharge</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #e61e2a 0%, #f8f9fb 45%, #f8f9fb 100%);
    min-height: 100vh;
    padding-bottom: 90px;
    overflow-x: hidden;
}
.header {
    height: 70px;
    background: linear-gradient(90deg, #e61e2a, #ff4b5c);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 23px;
    font-weight: 900;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0,0,0,0.25);
}
.hero {
    padding: 45px 20px 80px;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
}
.hero::before {
    content: '';
    position: absolute;
    width: 280px;
    height: 280px;
    background: rgba(255,255,255,0.12);
    border-radius: 50%;
    top: -80px;
    right: -100px;
}
.hero p { font-size: 15.5px; opacity: 0.95; margin-bottom: 6px; }
.hero h1 { font-size: 52px; font-weight: 900; letter-spacing: -1px; }
.main-card {
    background: white;
    margin: -55px 15px 25px;
    border-radius: 32px;
    padding: 28px 22px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    position: relative;
    z-index: 10;
}
.title { font-size: 18px; font-weight: 900; color: #1f2937; margin-bottom: 20px; }
.amount-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 25px;
}
.amount-btn {
    background: #f8fafc;
    border: 2.5px solid #e2e8f0;
    height: 68px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
}
.amount-btn.active {
    background: #e61e2a;
    color: white;
    border-color: #e61e2a;
    transform: scale(0.96);
}
.input-box {
    width: 100%;
    height: 62px;
    border: none;
    background: #f8fafc;
    border-radius: 20px;
    padding: 0 22px;
    font-size: 18px;
    font-weight: 800;
    outline: none;
    margin: 15px 0;
}
.main-btn {
    width: 100%;
    height: 64px;
    background: linear-gradient(90deg, #e61e2a, #ff4b5c);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(230,30,42,0.35);
    margin-top: 10px;
}
.slide-page {
    position: fixed;
    top: 0; left: 100%;
    width: 100%; height: 100%;
    background: #f8f9fb;
    z-index: 2000;
    transition: all 0.45s cubic-bezier(0.32, 0.72, 0, 1);
    overflow-y: auto;
}
.slide-page.active { left: 0; }
.top-bar {
    height: 68px;
    background: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-size: 20px;
    font-weight: 900;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 10;
}
.processing-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 3000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    text-align: center;
}
.processing-screen.show { display: flex; }
.spinner {
    width: 85px; height: 85px;
    border: 7px solid rgba(255,255,255,0.2);
    border-top: 7px solid #fff;
    border-radius: 50%;
    animation: spin 1.1s linear infinite;
    margin-bottom: 30px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.history-section { padding: 0 15px 20px; }
.history-card {
    background: white;
    border-radius: 24px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.bottom-nav {
    position: fixed;
    bottom: 0; width: 100%; height: 68px;
    background: white;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid #eee;
    z-index: 9999;
    box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
}
.nav-link {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #94a3b8;
    font-size: 10.5px; font-weight: 700;
    text-decoration: none;
}
.nav-link.active { color: #e61e2a; }
</style>
</head>
<body>

<div class="header">AMUL Recharge</div>
<div class="hero">
    <p>Main Wallet Balance</p>
    <h1 id="walletBalance">₹0</h1>
</div>

<div class="main-card">
    <div class="title">Select Recharge Amount</div>
    <div class="amount-grid" id="amountGrid"></div>
    <input type="number" id="customAmount" class="input-box" placeholder="Enter Custom Amount">
    <button class="main-btn" onclick="openQRPage()">PROCEED TO PAY →</button>
</div>

<!-- HISTORY -->
<div class="history-section">
    <div class="title">Recent Transactions</div>
    <div id="historyList"></div>
</div>

<!-- QR PAYMENT PAGE -->
<div class="slide-page" id="qrPage">
    <div class="top-bar">
        <span onclick="closeQRPage()" style="font-size:32px;cursor:pointer;margin-right:15px;">←</span>
        Scan QR to Pay
    </div>
    <div style="padding:25px; text-align:center;" id="qrContent"></div>
</div>

<!-- PROCESSING SCREEN -->
<div class="processing-screen" id="processingScreen">
    <div class="spinner"></div>
    <div class="processing-text">Payment Processing...</div>
    <div class="processing-sub" id="processingMsg">Waiting for admin verification</div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="dashbord.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="fund.html" class="nav-link active"><i class="fas fa-wallet"></i><span>Fund</span></a>
    <a href="team.html" class="nav-link"><i class="fas fa-users"></i><span>Team</span></a>
    <a href="upmine.html" class="nav-link"><i class="fas fa-user"></i><span>Mine</span></a>
</nav>

<script>
// ==================== CONFIG ====================
const PROXY_URL = "https://fjseur.sawanenter7209.workers.dev";
let currentPhone = localStorage.getItem("phone") || "";
let selectedAmount = 0;
let hasCredited = false;
let statusInterval = null;

// ==================== API ====================
async function getData(path) {
    try {
        const res = await fetch(PROXY_URL + "/db/" + path);
        return res.ok ? await res.json() : {};
    } catch(e) { return {}; }
}

async function setData(path, value) {
    try {
        await fetch(PROXY_URL + "/db/" + path, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(value)
        });
    } catch(e) {}
}

async function pushData(path, data) {
    try {
        await fetch(PROXY_URL + "/db/" + path, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
    } catch(e) {}
}

// ==================== TOAST ====================
function showToast(message, type = "success") {
    const toast = document.createElement("div");
    toast.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%);
        background:${type==='success'?'#16a34a':'#dc2626'}; color:white;
        padding:16px 24px; border-radius:16px; font-weight:800; z-index:99999;
        box-shadow:0 15px 35px rgba(0,0,0,0.3);`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
}

// ==================== WALLET ====================
async function loadWallet() {
    if (!currentPhone) return;
    const bal = await getData("demoWallet/" + currentPhone) || 0;
    document.getElementById("walletBalance").innerText = "₹" + Number(bal).toFixed(0);
}

// ==================== AMOUNT GRID ====================
const amounts = [100, 200, 500, 1000, 2000, 5000];
const grid = document.getElementById("amountGrid");
amounts.forEach(am => {
    grid.innerHTML += `<div class="amount-btn" onclick="selectAmount(this, ${am})">₹${am}</div>`;
});

window.selectAmount = (el, amt) => {
    selectedAmount = amt;
    document.getElementById("customAmount").value = amt;
    document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
    el.classList.add('active');
};

// ==================== OPEN QR PAGE ====================
window.openQRPage = async () => {
    const amt = document.getElementById("customAmount").value;
    if (!amt || Number(amt) <= 0) return showToast("Please enter valid amount", "error");

    selectedAmount = Number(amt);
    const settings = await getData("paymentSettings") || {};
    const upiId = settings.upi ? settings.upi.upiId : "admin@upi";

    const upiLink = `upi://pay?pa=${upiId}&pn=AMUL%20Recharge&am=${selectedAmount}&cu=INR&tr=${Date.now()}`;
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}`;

    const html = `
        <h2 style="margin-bottom:15px;color:#1f2937;">Scan & Pay ₹${selectedAmount}</h2>
        <img src="${qrUrl}" style="width:280px;height:280px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.2);">
        <p style="margin:20px 0 10px; font-weight:700; color:#e61e2a;">${upiId}</p>
        <small style="color:#666;">After payment, enter UTR below</small>
        <input type="text" id="utrInput" maxlength="12" style="width:100%;height:58px;margin:25px 0;background:#f8fafc;border:none;border-radius:18px;padding:0 20px;font-size:17px;" placeholder="Enter 12 Digit UTR">
        <button onclick="submitProof()" style="width:100%;height:64px;background:linear-gradient(90deg,#e61e2a,#ff4b5c);color:white;border:none;border-radius:18px;font-weight:900;font-size:18px;">SUBMIT PAYMENT PROOF</button>
    `;

    document.getElementById("qrContent").innerHTML = html;
    document.getElementById("qrPage").classList.add("active");
};

window.closeQRPage = () => document.getElementById("qrPage").classList.remove("active");

// ==================== FIXED SUBMIT PROOF (With 12 Digit + Duplicate Check) ====================
window.submitProof = async () => {
    const utrInput = document.getElementById("utrInput");
    const utr = utrInput.value.trim();

    // === 12 DIGIT VALIDATION ===
    if (!utr || utr.length !== 12 || isNaN(utr)) {
        return showToast("UTR must be exactly 12 digits", "error");
    }

    // === SAME UTR ALREADY USED CHECK ===
    const usedRequests = await getData("depositRequests") || {};
    for (let key in usedRequests) {
        const req = usedRequests[key];
        if (req.phone === currentPhone && req.utr === utr) {
            return showToast("This UTR is already used. Please enter a new UTR.", "error");
        }
    }

    // === SUBMIT REQUEST ===
    hasCredited = false;

    const requestData = {
        phone: currentPhone,
        amount: selectedAmount,
        channel: "qr",
        utr: utr,
        status: "pending",
        time: new Date().toLocaleString()
    };

    await pushData("depositRequests", requestData);

    document.getElementById("qrPage").classList.remove("active");
    document.getElementById("processingScreen").classList.add("show");
    document.getElementById("processingMsg").innerText = "Waiting for admin approval...";

    startLiveStatusCheck(utr);
};

// ==================== LIVE STATUS CHECK ====================
function startLiveStatusCheck(utr) {
    if (statusInterval) clearInterval(statusInterval);

    let attempts = 0;

    statusInterval = setInterval(async () => {
        if (hasCredited) return;
        attempts++;

        const requests = await getData("depositRequests") || {};

        for (let key in requests) {
            const req = requests[key];
            if (req.phone === currentPhone && req.utr === utr) {

                if (req.status === "success" && !hasCredited) {
                    hasCredited = true;
                    clearInterval(statusInterval);

                    const currentBal = Number(await getData("demoWallet/" + currentPhone) || 0);
                    await setData("demoWallet/" + currentPhone, currentBal + Number(req.amount));

                    document.getElementById("processingScreen").classList.remove("show");
                    showToast(`₹${req.amount} Added Successfully!`, "success");
                    loadWallet();
                    return;
                }

                if (req.status === "rejected") {
                    clearInterval(statusInterval);
                    document.getElementById("processingScreen").classList.remove("show");
                    showToast("Request Rejected by Admin", "error");
                    return;
                }
            }
        }

        if (attempts >= 90) {
            clearInterval(statusInterval);
            document.getElementById("processingScreen").classList.remove("show");
            showToast("Request is under review. Check later.", "success");
        }
    }, 4000);
}

// ==================== HISTORY ====================
async function loadHistory() {
    const requests = await getData("depositRequests") || {};
    let html = "";

    Object.keys(requests).reverse().forEach(key => {
        const r = requests[key];
        if (r.phone === currentPhone) {
            const color = r.status === "success" ? "#16a34a" : r.status === "rejected" ? "#dc2626" : "#f59e0b";
            html += `
            <div class="history-card">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <b style="font-size:22px;">₹${r.amount}</b><br>
                        <small>QR • ${r.time}</small>
                    </div>
                    <span style="color:${color};font-weight:900;padding:6px 14px;border-radius:30px;background:rgba(0,0,0,0.05);">
                        ${r.status.toUpperCase()}
                    </span>
                </div>
            </div>`;
        }
    });

    document.getElementById("historyList").innerHTML = html || `<p style="text-align:center;color:#888;padding:40px 0;">No transactions yet</p>`;
}

setInterval(loadHistory, 5000);
loadHistory();
loadWallet();

if (!currentPhone) showToast("Please login first!", "error");
</script>
</body>
</html>
