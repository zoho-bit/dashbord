<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>AMUL - My Investments</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #e61e2a 0%, #fff0f0 45%, #f8f9fa 100%);
    min-height: 100vh;
    padding-bottom: 90px;
}

.header {
    background: linear-gradient(90deg, #e61e2a, #ff4b5c);
    height: 75px;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-size: 21px;
    font-weight: 900;
    box-shadow: 0 6px 20px rgba(230,30,42,0.3);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.summary-card {
    background: white;
    margin: 20px 15px 15px;
    border-radius: 28px;
    padding: 25px 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    text-align: center;
}

.investment-card {
    background: white;
    border-radius: 26px;
    padding: 22px;
    margin: 15px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.1);
}

.plan-name {
    font-size: 19px;
    font-weight: 900;
    color: #1e2937;
    margin-bottom: 15px;
}

.amount-row {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
}

.amount-box { text-align: center; flex: 1; }
.amount-label { font-size: 12px; color: #666; margin-bottom: 4px; }
.amount-value { font-size: 22px; font-weight: 800; }

.daily { color: #16a34a; }

.progress-container {
    margin: 18px 0 8px;
}
.progress-bar {
    height: 10px;
    background: #e5e7eb;
    border-radius: 20px;
    overflow: hidden;
}
.progress {
    height: 100%;
    background: linear-gradient(90deg, #16a34a, #22c55e);
    border-radius: 20px;
    transition: width 0.8s ease;
}

/* Toast */
.custom-popup{
    position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-40px);
    background:#fff;width:90%;max-width:340px;border-radius:18px;padding:16px 18px;
    display:flex;align-items:center;gap:12px;box-shadow:0 15px 40px rgba(0,0,0,.18);
    z-index:99999;opacity:0;visibility:hidden;transition:all .4s;
}
.custom-popup.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
.popup-icon{width:48px;height:48px;border-radius:50%;background:#16a34a;color:#fff;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;}
.popup-text{flex:1}
.popup-title{font-size:16px;font-weight:700;color:#222;margin-bottom:3px}
.popup-message{font-size:13.5px;color:#555;line-height:1.4}
.popup-close{cursor:pointer;font-size:20px;color:#aaa;font-weight:bold}
</style>
</head>

<body>

<div class="header">
    <span onclick="history.back()" style="margin-right:15px;cursor:pointer;font-size:26px;">←</span>
    My Investments
</div>

<div class="summary-card" id="summaryCard">
    <p style="color:#666;font-size:14px;">Total Active Plans</p>
    <h1 style="font-size:42px;color:#16a34a;margin:8px 0;" id="activeCount">0</h1>
    <p style="color:#555;">Total Invested</p>
    <h2 style="color:#1e2937;font-size:28px;" id="totalInvested">₹0.00</h2>
</div>

<div style="padding:10px 15px;" id="investmentList">
    Loading your investments...
</div>

<!-- Toast Popup -->
<div class="custom-popup" id="toastPopup">
    <div class="popup-icon" id="toastIcon">✓</div>
    <div class="popup-text">
        <div class="popup-title" id="toastTitle">Success</div>
        <div class="popup-message" id="toastMessage">Action completed</div>
    </div>
    <div class="popup-close" onclick="closeToast()">×</div>
</div>

<script>
// ==================== CONFIG ====================
const PROXY_URL = "https://fjseur.sawanenter7209.workers.dev";
let currentPhone = localStorage.getItem("phone");

if(!currentPhone) location.href = "../dashbord.html";

// ==================== PROXY ====================
async function getData(path) {
    try {
        const res = await fetch(PROXY_URL + "/db/" + path);
        return res.ok ? await res.json() : {};
    } catch(e) { return {}; }
}

// ==================== LIVE REAL PROGRESS CALCULATION ====================
function getLiveProgress(purchase) {
    const totalDays = Number(purchase.days || 1);
    const startTime = Number(purchase.startTime || Date.now());
    const elapsedMs = Date.now() - startTime;
    const elapsedDays = Math.floor(elapsedMs / 86400000); // Real days passed
    const runningDay = Math.min(totalDays, elapsedDays + 1);
    
    const progress = Math.min(100, Math.floor((runningDay / totalDays) * 100));

    return {
        runningDay,
        totalDays,
        progress,
        dailyIncome: Number(purchase.dailyIncome || 0)
    };
}

// ==================== LOAD INVESTMENTS ====================
async function loadInvestments() {
    const purchases = await getData("purchases") || {};
    let html = "";
    let totalInvested = 0;
    let activeCount = 0;

    Object.keys(purchases).forEach(key => {
        const p = purchases[key];
        if (p.phone === currentPhone && !p.sold) {
            activeCount++;
            const amount = Number(p.amount || 0);
            totalInvested += amount;

            const info = getLiveProgress(p);

            html += `
            <div class="investment-card">
                <div class="plan-name">
                    <i class="fas fa-chart-line" style="color:#e61e2a;margin-right:8px;"></i>
                    ${p.planName || "Investment Plan"}
                </div>
                
                <div class="amount-row">
                    <div class="amount-box">
                        <div class="amount-label">Invested</div>
                        <div class="amount-value">₹${amount.toFixed(2)}</div>
                    </div>
                    <div class="amount-box">
                        <div class="amount-label">Daily Income</div>
                        <div class="amount-value daily">₹${info.dailyIncome.toFixed(2)}</div>
                    </div>
                </div>

                <div class="progress-container">
                    <div style="display:flex;justify-content:space-between;font-size:13px;color:#555;margin-bottom:6px;">
                        <span>Live Cycle Progress</span>
                        <span><b>${info.runningDay}</b> / ${info.totalDays} Days</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" style="width:${info.progress}%"></div>
                    </div>
                </div>

                <div style="margin-top:10px;font-size:13px;color:#666;">
                    Started: ${new Date(p.startTime).toLocaleDateString('en-IN')}
                </div>
            </div>`;
        }
    });

    // Update Summary
    document.getElementById("activeCount").innerText = activeCount;
    document.getElementById("totalInvested").innerText = "₹" + totalInvested.toFixed(2);

    if (activeCount === 0) {
        html = `
        <div style="text-align:center;padding:100px 20px;color:#777;">
            <i class="fas fa-chart-pie" style="font-size:70px;opacity:0.15;margin-bottom:20px;"></i>
            <h2>No Active Investments</h2>
            <p>Start investing from Fund section</p>
        </div>`;
    }

    document.getElementById("investmentList").innerHTML = html;
}

// Toast Popup
let toastTimer;
function showToast(type, title, message) {
    clearTimeout(toastTimer);
    const popup = document.getElementById("toastPopup");
    const icon = document.getElementById("toastIcon");

    document.getElementById("toastTitle").innerText = title;
    document.getElementById("toastMessage").innerText = message;

    icon.style.background = type === "success" ? "#16a34a" : "#dc2626";
    icon.innerHTML = type === "success" ? "✓" : "!";

    popup.classList.add("show");
    toastTimer = setTimeout(() => popup.classList.remove("show"), 2800);
}
window.closeToast = () => document.getElementById("toastPopup").classList.remove("show");

// Load Data
loadInvestments();
setInterval(loadInvestments, 4000);  // Live update every 4 seconds
</script>
</body>
</html>
