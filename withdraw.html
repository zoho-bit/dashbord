<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>AMUL Withdraw</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #e61e2a 0%, #f8f9fb 45%, #f8f9fb 100%);
    min-height: 100vh;
    padding-bottom: 90px;
}

.header {
    height: 70px;
    background: linear-gradient(90deg, #e61e2a, #ff4b5c);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 23px;
    font-weight: 900;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0,0,0,0.25);
}

.hero {
    padding: 45px 20px 80px;
    text-align: center;
    color: white;
}
.hero p { font-size: 15px; }
.hero h1 { font-size: 48px; font-weight: 900; margin-top: 8px; }

.main-card {
    background: white;
    margin: -55px 15px 25px;
    border-radius: 32px;
    padding: 28px 22px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}

.title { font-size: 18px; font-weight: 900; color: #1f2937; margin-bottom: 18px; }

.input-box {
    width: 100%;
    height: 62px;
    border: none;
    background: #f8fafc;
    border-radius: 20px;
    padding: 0 22px;
    font-size: 18px;
    font-weight: 800;
    outline: none;
    margin: 12px 0;
}

.main-btn {
    width: 100%;
    height: 64px;
    background: linear-gradient(90deg, #e61e2a, #ff4b5c);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 12px 30px rgba(230,30,42,0.35);
    margin-top: 15px;
}

/* YOUR ORIGINAL POPUP */
.custom-popup{
    position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-30px);
    background:#fff;width:90%;max-width:340px;border-radius:18px;padding:16px 18px;
    display:flex;align-items:center;gap:12px;box-shadow:0 15px 40px rgba(0,0,0,.15);
    z-index:99999;opacity:0;visibility:hidden;transition:.35s
}
.custom-popup.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.popup-icon{width:48px;height:48px;border-radius:50%;background:#16a34a;color:#fff;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;}
.popup-text{flex:1}
.popup-title{font-size:16px;font-weight:700;color:#222;margin-bottom:3px}
.popup-message{font-size:13.5px;color:#555;line-height:1.4}
.popup-close{cursor:pointer;font-size:20px;color:#aaa;font-weight:bold}

/* History Card */
.history-card {
    background: white;
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
.status {
    padding: 5px 14px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 900;
}
.pending { background:#fff3cd; color:#856404; }
.approved { background:#d4edda; color:#155724; }
.rejected { background:#f8d7da; color:#721c24; }

/* Bottom Nav */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 68px;
    background: white;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid #eee;
    z-index: 9999;
}
.nav-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    font-size: 10.5px;
    font-weight: 700;
    text-decoration: none;
}
.nav-link.active { color: #e61e2a; }
</style>
</head>

<body>

<div class="header">AMUL Withdraw</div>

<div class="hero">
    <p>Available Balance</p>
    <h1 id="walletBalance">₹0</h1>
</div>

<div class="main-card">
    <div class="title">Enter Withdrawal Amount</div>
    <input type="number" id="withdrawAmount" class="input-box" placeholder="Enter Amount">
    
    <div class="title" style="margin-top:20px;">Select Method</div>
    <select id="withdrawMethod" class="input-box" style="height:62px;font-size:17px;">
        <option value="bank">Bank Transfer</option>
        <option value="upi">UPI Transfer</option>
    </select>

    <button class="main-btn" onclick="submitWithdraw()">REQUEST WITHDRAWAL</button>
</div>

<!-- WITHDRAWAL HISTORY -->
<div style="padding:0 15px 20px;">
    <div class="title">Withdrawal History</div>
    <div id="historyList"></div>
</div>

<!-- YOUR ORIGINAL POPUP -->
<div class="custom-popup" id="popup">
    <div class="popup-icon" id="popupIcon">✓</div>
    <div class="popup-text">
        <div class="popup-title" id="popupTitle">Success</div>
        <div class="popup-message" id="popupMessage">Action completed</div>
    </div>
    <div class="popup-close" onclick="closePopup()">×</div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="dashbord.html" class="nav-link"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="fund.html" class="nav-link"><i class="fas fa-wallet"></i><span>Fund</span></a>
    <a href="team.html" class="nav-link"><i class="fas fa-users"></i><span>Team</span></a>
    <a href="upmine.html" class="nav-link"><i class="fas fa-user"></i><span>Mine</span></a>
</nav>

<script>
// ==================== CONFIG ====================
const PROXY_URL = "https://fjseur.sawanenter7209.workers.dev";
let currentPhone = localStorage.getItem("phone");

// ==================== PROXY ====================
async function getData(path) {
    try {
        const res = await fetch(PROXY_URL + "/db/" + path);
        return res.ok ? await res.json() : {};
    } catch(e) { return {}; }
}

async function setData(path, value) {
    try {
        await fetch(PROXY_URL + "/db/" + path, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(value)
        });
    } catch(e) {}
}

async function pushData(path, data) {
    try {
        await fetch(PROXY_URL + "/db/" + path, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
    } catch(e) {}
}

// ==================== YOUR ORIGINAL POPUP ====================
let popupTimer;
function showPopup(type, title, message) {
    clearTimeout(popupTimer);
    const popup = document.getElementById("popup");
    const icon = document.getElementById("popupIcon");

    document.getElementById("popupTitle").innerText = title;
    document.getElementById("popupMessage").innerText = message;

    if(type === "success"){
        icon.innerHTML = "✓"; 
        icon.style.background = "#16a34a";
    } else {
        icon.innerHTML = "!"; 
        icon.style.background = "#dc2626";
    }
    popup.classList.add("show");
    popupTimer = setTimeout(() => popup.classList.remove("show"), 2800);
}

window.closePopup = () => document.getElementById("popup").classList.remove("show");

// ==================== WALLET ====================
async function loadWallet() {
    const bal = await getData("demoWallet/" + currentPhone) || 0;
    document.getElementById("walletBalance").innerText = "₹" + Number(bal);
}
setInterval(loadWallet, 3000);
loadWallet();

// ==================== SUBMIT WITHDRAW ====================
window.submitWithdraw = async () => {
    const amount = Number(document.getElementById("withdrawAmount").value);
    const method = document.getElementById("withdrawMethod").value;

    if (!amount || amount <= 0) return showPopup("error", "Invalid", "Enter valid amount");
    if (amount < 100) return showPopup("error", "Minimum Limit", "Minimum ₹100");

    let balance = Number(await getData("demoWallet/" + currentPhone) || 0);
    if (amount > balance) return showPopup("error", "Low Balance", "Not enough balance");

    // Deduct Amount Immediately
    await setData("demoWallet/" + currentPhone, balance - amount);

    // Send Request
    await pushData("withdrawRequests", {
        phone: currentPhone,
        amount: amount,
        method: method,
        status: "pending",
        time: new Date().toLocaleString(),
        processed: false
    });

    showPopup("success", "Request Submitted", `₹${amount} withdrawal request sent`);
    document.getElementById("withdrawAmount").value = "";
    loadWallet();
    loadHistory();
};

// ==================== WITHDRAWAL HISTORY ====================
async function loadHistory() {
    const requests = await getData("withdrawRequests") || {};
    let html = "";

    Object.keys(requests).reverse().forEach(key => {
        const r = requests[key];
        if (r.phone === currentPhone) {
            const statusClass = r.status === "approved" ? "approved" : (r.status === "rejected" ? "rejected" : "pending");
            const statusText = r.status === "approved" ? "APPROVED" : (r.status === "rejected" ? "REJECTED" : "PENDING");

            html += `
            <div class="history-card">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <b style="font-size:20px;">₹${r.amount}</b><br>
                        <small>${r.method?.toUpperCase()} • ${r.time}</small>
                    </div>
                    <span class="status ${statusClass}">${statusText}</span>
                </div>
            </div>`;
        }
    });

    document.getElementById("historyList").innerHTML = html || `<p style="text-align:center;color:#888;padding:30px 0;">No withdrawal history yet</p>`;
}

// Load History on start and every 5 seconds
setInterval(loadHistory, 5000);
loadHistory();
</script>
</body>
</html>
