<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
<title>AMUL - Security Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #e61e2a 0%, #fff0f0 50%, #f8f9fa 100%);
    min-height: 100vh;
    padding-bottom: 90px;
}

.header {
    background: #e61e2a;
    height: 70px;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-size: 20px;
    font-weight: 900;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.card {
    background: white;
    border-radius: 24px;
    padding: 25px;
    margin: 20px 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}

.input-box {
    width:100%; padding:16px; border:1px solid #ddd; border-radius:16px; 
    margin-bottom:15px; font-size:16px;
}

.captcha-box {
    background:#f8fafc; padding:15px; border-radius:16px; margin:15px 0;
    text-align:center; font-size:18px; letter-spacing:4px; font-weight:700;
    user-select:none;
}

/* Toast Popup */
.custom-popup{
    position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-40px);
    background:#fff;width:90%;max-width:340px;border-radius:18px;padding:16px 18px;
    display:flex;align-items:center;gap:12px;box-shadow:0 15px 40px rgba(0,0,0,.18);
    z-index:99999;opacity:0;visibility:hidden;transition:all .4s;
}
.custom-popup.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0);}
.popup-icon{width:48px;height:48px;border-radius:50%;background:#16a34a;color:#fff;display:flex;justify-content:center;align-items:center;font-size:24px;font-weight:bold;}
.popup-text{flex:1}
.popup-title{font-size:16px;font-weight:700;color:#222;margin-bottom:3px}
.popup-message{font-size:13.5px;color:#555;line-height:1.4}
.popup-close{cursor:pointer;font-size:20px;color:#aaa;font-weight:bold}
</style>
</head>

<body>

<div class="header">
    <span onclick="history.back()" style="margin-right:15px;cursor:pointer;font-size:24px;">←</span>
    Security Password
</div>

<div class="card">
    <h3 style="margin-bottom:20px;">Change Login Password</h3>
    
    <input type="password" id="oldPass" class="input-box" placeholder="Old Password">
    <input type="password" id="newPass" class="input-box" placeholder="New Password">
    <input type="password" id="confirmPass" class="input-box" placeholder="Confirm New Password">

    <!-- CAPTCHA -->
    <div class="captcha-box" id="captchaBox">7 4 9 2</div>
    <input type="text" id="captchaInput" class="input-box" placeholder="Enter Captcha Code">

    <button onclick="changePassword()" style="width:100%;padding:16px;background:#e61e2a;color:white;border:none;border-radius:16px;font-weight:900;font-size:17px;margin-top:10px;">
        CHANGE PASSWORD
    </button>
</div>

<!-- Toast Popup -->
<div class="custom-popup" id="toastPopup">
    <div class="popup-icon" id="toastIcon">✓</div>
    <div class="popup-text">
        <div class="popup-title" id="toastTitle">Success</div>
        <div class="popup-message" id="toastMessage">Action completed</div>
    </div>
    <div class="popup-close" onclick="closeToast()">×</div>
</div>

<script>
// ==================== CONFIG ====================
const PROXY_URL = "https://fjseur.sawanenter7209.workers.dev";
let currentPhone = localStorage.getItem("phone");
let captchaCode = "";

// ==================== PROXY ====================
async function getData(path) {
    try {
        const res = await fetch(PROXY_URL + "/db/" + path);
        return res.ok ? await res.json() : {};
    } catch(e) { return {}; }
}

async function setData(path, data) {
    try {
        await fetch(PROXY_URL + "/db/" + path, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
    } catch(e) {}
}

// ==================== CAPTCHA ====================
function generateCaptcha() {
    captchaCode = Math.floor(1000 + Math.random() * 9000).toString();
    document.getElementById("captchaBox").innerText = captchaCode;
}

// ==================== CHANGE PASSWORD ====================
window.changePassword = async () => {
    const oldPass = document.getElementById("oldPass").value.trim();
    const newPass = document.getElementById("newPass").value.trim();
    const confirmPass = document.getElementById("confirmPass").value.trim();
    const captchaInput = document.getElementById("captchaInput").value.trim();

    if (!oldPass || !newPass || !confirmPass) {
        return showToast("error", "Error", "All fields are required");
    }
    if (newPass !== confirmPass) {
        return showToast("error", "Mismatch", "New password and confirm password do not match");
    }
    if (newPass.length < 4) {
        return showToast("error", "Weak Password", "Password must be at least 4 characters");
    }
    if (captchaInput !== captchaCode) {
        return showToast("error", "Wrong Captcha", "Please enter correct captcha");
    }

    // Verify Old Password
    const users = await getData("users") || {};
    let userKey = null;

    for (let k in users) {
        if (users[k].phone === currentPhone) {
            userKey = k;
            break;
        }
    }

    if (!userKey || users[userKey].password !== oldPass) {
        return showToast("error", "Wrong Password", "Old password is incorrect");
    }

    // Update Password
    users[userKey].password = newPass;
    await setData(`users/${userKey}`, users[userKey]);

    // Success Message + Auto Logout
    showToast("success", "Success", "Password changed successfully. Logging out...");

    // Clear fields
    document.getElementById("oldPass").value = "";
    document.getElementById("newPass").value = "";
    document.getElementById("confirmPass").value = "";
    document.getElementById("captchaInput").value = "";
    generateCaptcha();

    // Auto Logout after 2 seconds
    setTimeout(() => {
        localStorage.removeItem("phone");
        location.href = "dashbord.html";   // Change this if your login page name is different
    }, 2000);
};

// Toast Popup
let toastTimer;
function showToast(type, title, message) {
    clearTimeout(toastTimer);
    const popup = document.getElementById("toastPopup");
    const icon = document.getElementById("toastIcon");

    document.getElementById("toastTitle").innerText = title;
    document.getElementById("toastMessage").innerText = message;

    icon.style.background = type === "success" ? "#16a34a" : "#dc2626";
    icon.innerHTML = type === "success" ? "✓" : "!";

    popup.classList.add("show");
    toastTimer = setTimeout(() => popup.classList.remove("show"), 2800);
}
window.closeToast = () => document.getElementById("toastPopup").classList.remove("show");

// Init
generateCaptcha();
</script>
</body>
</html>
