<script>

const PROXY_URL =
"https://fjseur.sawanenter7209.workers.dev";

// ===== TEST MODE =====
// true = 1 minute
// false = 24 hour

const TEST_MODE = true;

const INCOME_INTERVAL =
TEST_MODE
? 60000
: 86400000;

let popupTimer;
let selectedPlan = null;
let sellPurchase = null;
let allPlans = [];
let userPurchases = {};

const currentPhone =
localStorage.getItem("phone") || "";

if(!currentPhone){

location.href = "login.html";

}

// ================= API =================

async function proxyRequest(endpoint,method="GET",body=null){

try{

const options = {
method,
headers:{
"Content-Type":"application/json"
}
};

if(body){

options.body =
JSON.stringify(body);

}

const res =
await fetch(
PROXY_URL + endpoint,
options
);

const text =
await res.text();

return text
? JSON.parse(text)
: null;

}catch(e){

console.log(e);
return null;

}

}

async function getData(path){

return await proxyRequest(
"/db/" + path
);

}

async function setData(path,data){

return await proxyRequest(
"/db/" + path,
"PUT",
data
);

}

async function pushData(path,data){

return await proxyRequest(
"/db/" + path,
"POST",
data
);

}

function listenData(path,callback){

setInterval(async()=>{

const data =
await getData(path);

callback({
val:()=>data
});

},2000);

}

// ================= POPUP =================

function showPopup(type,title,message){

clearTimeout(popupTimer);

const popup =
document.getElementById("popup");

const icon =
document.getElementById("popupIcon");

document.getElementById("popupTitle")
.innerText = title;

document.getElementById("popupMessage")
.innerText = message;

if(type === "success"){

icon.innerHTML = "✓";
icon.style.background = "#16a34a";

}else{

icon.innerHTML = "!";
icon.style.background = "#dc2626";

}

popup.classList.add("show");

popupTimer = setTimeout(()=>{

popup.classList.remove("show");

},2500);

}

function closePopup(){

document.getElementById("popup")
.classList.remove("show");

}

// ================= USER =================

function logoutUser(){

localStorage.clear();

location.href = "index.html";

}

async function findUserByPhone(phone){

const users =
await getData("users");

if(!users) return null;

for(let key in users){

if(users[key].phone === phone){

return {
key,
data:users[key]
};

}

}

return null;

}

// ================= WALLET =================

function listenWalletBalance(){

listenData(
"demoWallet/" + currentPhone,

(snap)=>{

document.getElementById("walletBalance")
.innerText =
Number(snap.val() || 0).toFixed(2);

});

}

// ================= DAILY INCOME =================

async function processDailyIncome(){

const purchases =
await getData("purchases");

if(!purchases) return;

for(let key in purchases){

let p = purchases[key];

if(p.sold === true) continue;

const startTime =
Number(p.startTime || Date.now());

const days =
Number(p.days || 0);

const dailyIncome =
Number(p.dailyIncome || 0);

const amount =
Number(p.amount || 0);

const completedDays =
Math.floor(
(Date.now() - startTime)
/
INCOME_INTERVAL
);

let creditedDays =
Number(p.creditedDays || 0);

if(completedDays > creditedDays){

let addDays =
completedDays - creditedDays;

if(addDays + creditedDays > days){

addDays =
days - creditedDays;

}

creditedDays += addDays;

p.creditedDays =
creditedDays;

p.totalIncome =
creditedDays * dailyIncome;

await setData(
"purchases/" + key,
p
);

}

if(creditedDays >= days){

const walletPath =
"demoWallet/" + p.phone;

let balance =
Number(await getData(walletPath) || 0);

const finalAmount =
amount + Number(p.totalIncome || 0);

await setData(
walletPath,
balance + finalAmount
);

p.sold = true;

p.completedAt =
Date.now();

await setData(
"purchases/" + key,
p
);

}

}

}

// ================= PURCHASES =================

function listenPurchases(){

listenData("purchases",(snap)=>{

userPurchases = {};

const data =
snap.val() || {};

Object.keys(data).forEach((k)=>{

const p = data[k];

if(
p.phone === currentPhone &&
p.sold !== true
){

if(!userPurchases[p.planKey]){

userPurchases[p.planKey] = [];

}

userPurchases[p.planKey]
.push({
key:k,
...p
});

}

});

renderPlans();

});

}

// ================= LOAD PLANS =================

function loadPlans(){

listenData("plans",(snap)=>{

allPlans = [];

const data =
snap.val() || {};

Object.keys(data).forEach((k)=>{

allPlans.push({
key:k,
...data[k]
});

});

renderPlans();

});

}

// ================= PRODUCT INFO =================

window.openPlanInfo = function(planKey){

const plan =
allPlans.find(p=>p.key === planKey);

if(!plan) return;

document.getElementById("infoModalTitle")
.innerText = plan.name;

document.getElementById("infoModalText")
.innerText =
plan.info ||
plan.description ||
"No information available";

document.getElementById("infoModal")
.classList.add("show");

};

window.closeInfoModal = function(){

document.getElementById("infoModal")
.classList.remove("show");

};

// ================= RENDER =================

function renderPlans(){

const container =
document.getElementById("planContainer");

container.innerHTML = "";

allPlans.forEach((plan)=>{

const purchases =
userPurchases[plan.key] || [];

const count =
purchases.length;

let totalIncome = 0;

purchases.forEach((p)=>{

totalIncome +=
Number(p.totalIncome || 0);

});

container.innerHTML += `

<div class="plan-card">

${count > 0
? `
<div class="invest-count">
×${count} Invested
</div>
`
: ""}

<div class="days-badge">
Days : ${plan.days}
</div>

<div class="plan-layout">

<img
src="${plan.image}"
class="plan-img">

<div class="plan-details">

<h4 class="plan-name">
${plan.name}
</h4>

<div class="stats-row">

<div class="stat-group">

<span>Daily Income</span>

<b>
₹${Number(plan.dailyIncome).toFixed(2)}
</b>

</div>

<div class="stat-group">

<span>Total Return</span>

<b>
₹${(
Number(plan.dailyIncome)
*
Number(plan.days)
).toFixed(2)}
</b>

</div>

</div>

${count > 0
? `
<div class="total-income">

Active : ${count}
<br>

Total Income :
₹${totalIncome.toFixed(2)}

<br><br>

${purchases.map((purchase,index)=>{

const canSell =
(
Date.now()
-
Number(purchase.startTime || 0)
)
>= INCOME_INTERVAL;

return `

<div style="
margin-bottom:6px;
color:${canSell ? '#16a34a' : '#dc2626'}
">

Invest ${index + 1}
|
Income :
₹${Number(
purchase.totalIncome || 0
).toFixed(2)}

|
${canSell
? "Sell Ready"
: "Sell Locked"
}

</div>

`;

}).join("")}

</div>
`
: ""}

<div class="price-section">

<span>

Price :

<b>
₹${Number(plan.price).toFixed(2)}
</b>

</span>

<div class="plan-actions">

<button
class="btn-invest"
onclick="buyPlanByKey('${plan.key}')">

Invest

</button>

${purchases.map((purchase,index)=>{

const canSell =
(
Date.now()
-
Number(purchase.startTime || 0)
)
>= INCOME_INTERVAL;

return `

<button
class="btn-sell"
${!canSell
? "disabled style='opacity:.5'"
: ""
}
onclick="
${canSell
? `openSellModal('${purchase.key}')`
: `showPopup(
'error',
'Wait',
'24 hour complete hone ke baad hi sell kar sakte ho'
)`
}
">

Sell ${index + 1}

</button>

`;

}).join("")}

<button
class="btn-info"
onclick="openPlanInfo('${plan.key}')">

i

</button>

</div>

</div>

</div>

</div>

</div>

`;

});

}

// ================= BUY =================

window.buyPlanByKey = function(planKey){

const plan =
allPlans.find(p=>p.key === planKey);

if(!plan) return;

selectedPlan = plan;

document.getElementById("cModalPlanName")
.innerText = plan.name;

document.getElementById("cModalAmount")
.innerText =
"₹" + Number(plan.price).toFixed(2);

document.getElementById("cModalDaily")
.innerText =
"₹" + Number(plan.dailyIncome).toFixed(2);

document.getElementById("cModalCycle")
.innerText =
plan.days;

document.getElementById("cModalPassword")
.value = "";

document.getElementById("classyModal")
.classList.add("show");

};

window.closeClassyModal = function(){

document.getElementById("classyModal")
.classList.remove("show");

};

// ================= FIXED CONFIRM BUY =================
document.getElementById("cModalConfirmBtn")
.addEventListener("click", async function(){

    if(!selectedPlan) return;

    const pass = document.getElementById("cModalPassword").value.trim();
    if(!pass){
        return showPopup("error", "Password", "Enter password");
    }

    const user = await findUserByPhone(currentPhone);
    if(!user || user.data.password !== pass){
        return showPopup("error", "Wrong Password", "Invalid password");
    }

    const walletPath = "demoWallet/" + currentPhone;
    let balance = Number(await getData(walletPath) || 0);
    const planPrice = Number(selectedPlan.price);

    if(balance < planPrice){
        return showPopup("error", "Low Balance", "Insufficient balance");
    }

    // ================= WALLET SE PAISA KATNA =================
    const newBalance = balance - planPrice;

    // Wallet Update
    const walletUpdated = await setData(walletPath, newBalance);
    if(!walletUpdated){
        return showPopup("error", "Error", "Wallet update failed");
    }

    // Purchase Record Banaye
    const purchaseData = {
        phone: currentPhone,
        planKey: selectedPlan.key,
        planName: selectedPlan.name,
        amount: planPrice,
        dailyIncome: Number(selectedPlan.dailyIncome),
        days: Number(selectedPlan.days),
        startTime: Date.now(),
        creditedDays: 0,
        totalIncome: 0,
        sold: false
    };

    const purchaseResult = await pushData("purchases", purchaseData);

    if(!purchaseResult){
        // Rollback - Paise wapas kar do
        await setData(walletPath, balance);
        return showPopup("error", "Failed", "Investment failed. Money refunded.");
    }

    // Success
    closeClassyModal();
    showPopup("success", "Success", "Investment successful!");

    // Wallet Balance UI mein turant update
    document.getElementById("walletBalance").innerText = newBalance.toFixed(2);
});
// ================= SELL =================

window.openSellModal = function(purchaseKey){

sellPurchase = purchaseKey;

document.getElementById("sellPassword")
.value = "";

document.getElementById("sellModal")
.classList.add("show");

};

window.closeSellModal = function(){

document.getElementById("sellModal")
.classList.remove("show");

};

async function confirmSell(){

if(!sellPurchase) return;

const pass =
document.getElementById("sellPassword")
.value.trim();

if(!pass){

return showPopup(
"error",
"Password",
"Enter password"
);

}

const user =
await findUserByPhone(currentPhone);

if(
!user ||
user.data.password !== pass
){

return showPopup(
"error",
"Wrong Password",
"Invalid password"
);

}

const purchase =
await getData(
"purchases/" + sellPurchase
);

if(!purchase){

return showPopup(
"error",
"Error",
"Purchase not found"
);

}

if(purchase.sold === true){

return showPopup(
"error",
"Closed",
"Already sold"
);

}

const canSell =
(
Date.now()
-
Number(purchase.startTime || 0)
)
>= INCOME_INTERVAL;

if(!canSell){

return showPopup(
"error",
"Not Allowed",
"24 hour complete hone ke baad hi sell kar sakte ho"
);

}

const walletPath =
"demoWallet/" + currentPhone;

let balance =
Number(await getData(walletPath) || 0);

const finalAmount =
Number(purchase.amount || 0)
+
Number(purchase.totalIncome || 0);

await setData(
walletPath,
balance + finalAmount
);

purchase.sold = true;

purchase.manualSell = true;

purchase.completedAt =
Date.now();

await setData(
"purchases/" + sellPurchase,
purchase
);

closeSellModal();

showPopup(
"success",
"Sold Successfully",
"Amount wallet me add ho gaya"
);

}

// ================= START =================

listenWalletBalance();

listenPurchases();

loadPlans();

processDailyIncome();

setInterval(()=>{

processDailyIncome();

},10000);

</script>
